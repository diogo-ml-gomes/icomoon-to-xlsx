  <body>
    <main class="app-shell">
      <section class="panel panel-left">
        <header class="card card-header">
          <div class="row row-between row-no-wrap">
            <h1>IcoMoon JSON -> CSV / XLSX</h1>
            <label class="theme-switch" for="themeToggleInput" title="Toggle theme">
              <input
                id="themeToggleInput"
                type="checkbox"
                role="switch"
                aria-label="Toggle light or dark theme"
                aria-checked="false"
              />
              <span class="theme-switch-ui" aria-hidden="true">
                <span class="theme-icon theme-icon-sun">☀</span>
                <span class="theme-icon theme-icon-moon">☾</span>
                <span class="theme-switch-thumb"></span>
              </span>
            </label>
          </div>
          <p class="muted">Supports IcoMoon <strong>V1</strong> and <strong>V2</strong>.</p>
        </header>

        <div class="card card-meta">
          <div class="row row-between row-no-wrap">
            <div class="row row-tight meta-badges">
              <span id="fileBadge" class="badge badge-soft">No file</span>
              <span id="formatBadge" class="badge" hidden></span>
              <span id="statsBadge" class="badge" hidden></span>
            </div>
            <button id="btnRemoveJson" type="button" class="btn-ghost btn-remove-json" hidden disabled>
              Remove JSON
            </button>
          </div>
        </div>

        <div class="card card-drop">
          <div id="jsonAccordion" class="mobile-accordion mobile-accordion-json">
            <button
              id="jsonAccordionToggle"
              type="button"
              class="mobile-accordion-toggle"
              aria-expanded="true"
              aria-controls="jsonAccordionContent"
            >
              <span>JSON Preview</span>
              <span class="mobile-accordion-chevron" aria-hidden="true">▾</span>
            </button>

            <div id="jsonAccordionContent" class="mobile-accordion-content">
              <div class="row">
                <div class="drop" id="dropZone" role="button" tabindex="0" aria-label="Drag or choose JSON file">
                  <div id="dropEmptyState">
                    <strong>Drag JSON here</strong> or click to choose
                    <div class="muted">e.g. <code>selection.json</code> (V1) / export (V2)</div>
                  </div>
                  <div id="dropJsonPreview" class="drop-json-preview" hidden></div>
                </div>
                <input id="fileInput" type="file" accept=".json,application/json" hidden />
              </div>
            </div>
          </div>
        </div>

      </section>

      <div
        id="panelResizeHandle"
        class="panel-resizer"
        role="separator"
        aria-orientation="vertical"
        aria-label="Resize left and right panels"
        tabindex="0"
      ></div>

      <section class="panel panel-right">
        <div class="card card-preview">
          <div id="previewAccordion" class="mobile-accordion mobile-accordion-preview">
            <button
              id="previewAccordionToggle"
              type="button"
              class="mobile-accordion-toggle"
              aria-expanded="true"
              aria-controls="previewAccordionContent"
            >
              <span>Preview</span>
              <span class="mobile-accordion-chevron" aria-hidden="true">▾</span>
            </button>

            <div id="previewAccordionContent" class="mobile-accordion-content">
              <div class="row row-between">
                <div class="row row-tight">
                  <strong>Preview</strong>
                  <span class="muted" id="previewMeta">-</span>
                </div>
              </div>

              <div class="row mt-10">
                <input id="searchInput" class="search-grow" type="text" placeholder="Search icon name..." />

                <label class="row row-tight field-limit">
                  <span class="muted">Preview limit</span>
                  <input id="limitInput" type="number" min="1" max="50000" value="500" />
                </label>

                <label class="row row-tight">
                  <input id="uniqueSort" type="checkbox" />
                  Unique + A->Z
                </label>

                <button id="btnResetFilters" type="button" class="btn-ghost">Reset filters</button>
                <button id="btnCopy" type="button" class="btn-ghost" disabled>Copy preview</button>
              </div>

              <div id="previewScroll" class="scroll mt-10">
                <table>
                  <thead>
                    <tr>
                      <th class="w-90">#</th>
                      <th>name</th>
                      <th class="w-120">unicode css</th>
                    </tr>
                  </thead>
                  <tbody id="previewBody">
                    <tr><td colspan="3" class="muted">No data yet.</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <div class="card card-details">
          <div class="row">
            <label class="download-field download-name-field">
              <span class="muted">File name</span>
              <input id="downloadFileName" type="text" value="icons_xlsx" placeholder="icons_xlsx" />
            </label>
            <label class="download-field download-format-field select-field">
              <span class="muted">Format</span>
              <select id="downloadFormat">
                <option value="xlsx" selected>XLSX</option>
                <option value="csv">CSV</option>
              </select>
            </label>
            <button id="btnDownload" type="button" class="btn-primary" disabled>Download</button>
          </div>
        </div>
      </section>
    </main>
    <div id="iconHoverPreview" class="icon-hover-preview" hidden>
      <div id="iconHoverSvg" class="icon-hover-svg"></div>
      <div id="iconHoverName" class="icon-hover-name"></div>
    </div>
    <div
      id="errorPopup"
      class="error-popup"
      role="alertdialog"
      aria-modal="true"
      aria-labelledby="errorPopupTitle"
      aria-describedby="errorPopupMessage"
      hidden
    >
      <div class="error-popup-card" role="document">
        <div class="error-popup-head">
          <strong id="errorPopupTitle">Error</strong>
          <button id="errorPopupClose" type="button" class="error-popup-close" aria-label="Close error popup">×</button>
        </div>
        <div id="errorPopupMessage" class="error-popup-message"></div>
      </div>
    </div>
    <div id="appToast" class="app-toast-stack" aria-live="polite" aria-atomic="false" hidden></div>
