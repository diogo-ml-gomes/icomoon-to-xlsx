  --error-overlay: rgb(12 18 29 / 45%);
}

  --badge-bg: #1b2437;
  --badge-soft-bg: #1f2b40;
  --button-bg: #1d2a42;
  --button-border: #3a4d72;
  --button-hover-border: #5f7eaf;
  --button-hover-shadow: 0 4px 14px rgb(0 0 0 / 32%);

  --table-row-hover: #213558;
  --table-head-bg: #1b2a44;

  --json-scroll-thumb: #3f5781;
  --json-scroll-thumb-hover: #5d79a9;
  --json-row-hover: rgb(93 145 255 / 18%);

* {
  box-sizing: border-box;
}
html,
body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
}
body {
  font-family:
    "Segoe UI",
    "SF Pro Text",
    "Helvetica Neue",
    sans-serif;
  color: var(--text);
  background:
    radial-gradient(
      1200px 520px at 100% -30%,
      var(--bg-grad-a) 0%,
      transparent 55%),
    radial-gradient(
      900px 400px at -20% -30%,
      var(--bg-grad-b) 0%,
      transparent 50%),
    var(--bg);
}
h1 {
  margin: 0;
  font-size: clamp(22px, 2.2vw, 34px);
  line-height: 1.1;
}
p {
  margin: 0;
}
.muted {
  color: var(--muted);
}
.app-shell {
  --panel-left-min: 600px;
  --panel-right-min: 460px;
  --panel-left-width: 44%;
  --panel-divider-width: 10px;
  height: 100vh;
  padding: 12px;
  display: grid;
  grid-template-columns: minmax(var(--panel-left-min), var(--panel-left-width)) var(--panel-divider-width) minmax(var(--panel-right-min), 1fr);
  gap: 8px;
}
.panel {
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.panel-resizer {
  position: relative;
  width: 100%;
  height: 100%;
  cursor: col-resize;
  border-radius: 10px;
  outline: none;
  touch-action: none;
}
.panel-resizer::before {
  content: "";
  position: absolute;
  top: 8px;
  bottom: 8px;
  left: 50%;
  width: 2px;
  border-radius: 999px;
  background: var(--line);
  transform: translateX(-50%);
  transition: background-color 120ms ease, box-shadow 120ms ease;
}
.panel-resizer:hover::before,
.panel-resizer:focus-visible::before {
  background: var(--brand);
  box-shadow: 0 0 0 2px rgb(15 94 247 / 18%);
}
.app-shell.is-resizing,
.app-shell.is-resizing * {
  cursor: col-resize !important;
  user-select: none;
}
.card {
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 14px;
  background: var(--card);
  box-shadow: var(--shadow);
}
.card-header {
  gap: 8px;
  display: flex;
  flex-direction: column;
}
.card-meta {
  padding-block: 10px;
}
.card-meta #fileBadge {
  max-width: 340px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-details,
.card-preview {
  min-height: 0;
  display: flex;
  flex-direction: column;
}
.card-details .row {
  width: 100%;
  display: grid;
  grid-template-columns: minmax(240px, 1fr) 120px auto;
  gap: 10px;
  align-items: end;
}
.card-drop {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
}
.card-drop > .mobile-accordion {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
}
.card-drop > .mobile-accordion > .mobile-accordion-content {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
}
.card-drop .mobile-accordion-content > .row:first-child {
  flex: 1;
  min-height: 0;
}
.card-drop .drop {
  flex: 1;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}
.card-drop .drop.has-json {
  justify-content: flex-start;
  align-items: stretch;
  text-align: left;
  cursor: default;
  border: 1px solid var(--drop-json-border);
  background: var(--drop-json-bg);
  color: var(--drop-json-text);
  padding: 10px;
}
.card-preview {
  flex: 1;
}
.card-preview > .mobile-accordion {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
}
.card-preview > .mobile-accordion > .mobile-accordion-content {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
}
.row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}
.row-tight {
  gap: 8px;
}
.row-between {
  justify-content: space-between;
}
.row-no-wrap {
  flex-wrap: nowrap;
}
.row-no-wrap > :first-child {
  min-width: 0;
}
.mobile-accordion {
  min-height: 0;
}
.mobile-accordion-toggle {
  display: none;
}
.mobile-accordion-chevron {
  transition: transform 140ms ease;
}
.mobile-accordion.is-collapsed .mobile-accordion-chevron {
  transform: rotate(-90deg);
}
.mobile-accordion-content {
  min-height: 0;
}
.theme-switch {
  position: relative;
  display: inline-flex;
  align-items: center;
  cursor: pointer;
  flex-shrink: 0;
  user-select: none;
  -webkit-user-select: none;
}
.theme-switch input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}
.theme-switch-ui {
  width: 74px;
  height: 34px;
  border-radius: 999px;
  border: 1px solid var(--theme-switch-border);
  background: var(--theme-switch-track);
  position: relative;
  transition: border-color 120ms ease, background-color 120ms ease;
}
.theme-switch-thumb {
  position: absolute;
  left: 3px;
  top: 3px;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--theme-switch-thumb);
  box-shadow: var(--theme-switch-thumb-shadow);
  transition: transform 160ms ease;
}
.theme-icon {
  position: absolute;
  top: 50%;
  font-size: 14px;
  line-height: 1;
  z-index: 1;
  opacity: 0.85;
  transform: translate(-50%, -50%);
  transition: opacity 120ms ease, color 120ms ease;
}
.theme-icon-sun {
  left: 16px;
  color: var(--theme-icon-on);
}
.theme-icon-moon {
  left: calc(100% - 16px);
  color: var(--theme-icon-off);
}
.theme-switch input:checked + .theme-switch-ui .theme-switch-thumb {
  transform: translateX(40px);
}
.theme-switch input:checked + .theme-switch-ui .theme-icon-sun {
  color: var(--theme-icon-off);
  opacity: 0.65;
}
.theme-switch input:checked + .theme-switch-ui .theme-icon-moon {
  color: var(--theme-icon-on);
  opacity: 1;
}
.theme-switch:hover .theme-switch-ui {
  border-color: var(--button-hover-border);
  box-shadow: var(--button-hover-shadow);
}
.theme-switch input:focus-visible + .theme-switch-ui {
  outline: 2px solid var(--json-focus);
  outline-offset: 2px;
}
.mt-8 {
  margin-top: 8px;
}
.mt-10 {
  margin-top: 10px;
}
.mt-12 {
  margin-top: 12px;
}
.drop {
  border: 2px dashed var(--drop-border);
  border-radius: 14px;
  padding: 16px;
  background: var(--drop-bg);
  cursor: pointer;
  width: 100%;
  position: relative;
  transition: border-color 120ms ease, background-color 120ms ease;
}
.drop.drag {
  border-color: var(--brand);
  background: var(--drop-drag-bg);
}
#dropEmptyState {
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: center;
}
#dropEmptyState[hidden],
#dropJsonPreview[hidden] {
  display: none;
}
.meta-badges {
  min-width: 0;
  flex: 1;
}
.btn-remove-json.btn-ghost {
  flex-shrink: 0;
  height: 24px;
  padding: 3px 10px;
  border-radius: 999px;
  line-height: 1;
  font-size: 12px;
  background: transparent;
  border-color: var(--danger-border);
  color: var(--danger-border);
  transition:
    background-color 180ms ease,
    color 180ms ease,
    border-color 180ms ease,
    box-shadow 180ms ease,
    transform 120ms ease;
}
.btn-remove-json.btn-ghost:hover:not(:disabled) {
  background: var(--danger-bg);
  border-color: var(--danger-border-hover);
  color: var(--danger-text);
}
.btn-remove-json.btn-ghost:active:not(:disabled) {
  transform: translateY(1px);
}
.drop-json-preview {
  width: 100%;
  height: 100%;
  min-height: 0;
  position: relative;
  overflow: auto;
  border: 0;
  border-radius: 0;
  background: transparent;
  color: inherit;
  padding: 4px 2px;
  font-size: 12px;
  scrollbar-width: thin;
  scrollbar-color: var(--json-scroll-thumb) var(--json-scroll-track);
}
.drop-json-preview pre {
  margin: 0;
  white-space: pre-wrap;
  word-break: break-word;
}
.drop-json-preview::-webkit-scrollbar {
  width: 11px;
  height: 11px;
}
.drop-json-preview::-webkit-scrollbar-track {
  background: var(--json-scroll-track);
}
.drop-json-preview::-webkit-scrollbar-thumb {
  background: var(--json-scroll-thumb);
  border: 2px solid var(--json-scroll-track);
  border-radius: 999px;
}
.drop-json-preview::-webkit-scrollbar-thumb:hover {
  background: var(--json-scroll-thumb-hover);
}
.icon-hover-preview {
  position: fixed;
  left: 0;
  top: 0;
  width: 138px;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: var(--card);
  color: var(--text);
  box-shadow: var(--shadow);
  pointer-events: none;
  z-index: 80;
  opacity: 0;
  transition: opacity 90ms ease;
}
.icon-hover-preview.is-visible {
  opacity: 1;
}
.icon-hover-svg {
  display: grid;
  place-items: center;
  height: 76px;
  border: 1px solid var(--line-soft);
  border-radius: 10px;
  background: var(--drop-bg);
  color: var(--text);
}
.icon-hover-svg svg {
  width: 58px;
  height: 58px;
  display: block;
}
.icon-hover-name {
  margin-top: 8px;
  font-size: 12px;
  font-weight: 600;
  text-align: center;
  line-height: 1.3;
  word-break: break-word;
}
.badge {
  font-size: 12px;
  border: 1px solid var(--line);
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--badge-bg);
}
.badge-soft {
  background: var(--badge-soft-bg);
}
button {
  padding: 9px 12px;
  border-radius: 10px;
  border: 1px solid var(--button-border);
  background: var(--button-bg);
  color: var(--text);
  cursor: pointer;
  transition:
    transform 60ms ease,
    box-shadow 120ms ease,
    border-color 120ms ease;
}
button:hover:not(:disabled) {
  border-color: var(--button-hover-border);
  box-shadow: var(--button-hover-shadow);
}
button:active:not(:disabled) {
  transform: translateY(1px);
}
button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  box-shadow: none;
}
.btn-primary {
  background: var(--brand);
  color: var(--brand-ink);
  border-color: var(--brand-border);
}
.btn-primary:hover:not(:disabled) {
  border-color: var(--brand-border-hover);
}
.btn-ghost {
  background: var(--btn-ghost-bg);
}
.select-field {
  position: relative;
}
.select-field::after {
  content: "\25be";
  position: absolute;
  right: 12px;
  top: auto;
  bottom: 12px;
  transform: none;
  color: var(--muted);
  font-size: 12px;
  line-height: 1;
  pointer-events: none;
}
.download-field {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 6px;
  min-width: 0;
}
.download-field > .muted {
  display: block;
  width: 100%;
  text-align: left;
  line-height: 1.1;
}
input[type=text],
input[type=number],
select {
  padding: 9px 11px;
  border-radius: 10px;
  border: 1px solid var(--input-border);
  background: var(--input-bg);
  color: var(--text);
  min-width: 0;
}
select {
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  padding-right: 28px;
}
.search-grow {
  flex: 1;
  min-width: 180px;
}
.download-name-field {
  min-width: 0;
}
.download-name-field input[type=text] {
  width: 100%;
}
.download-format-field {
  min-width: 120px;
  width: 120px;
}
.download-format-field select {
  width: 100%;
}
.card-details #btnDownload {
  height: 38px;
}
.field-limit input[type=number] {
  width: 96px;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 0;
}
th,
td {
  text-align: left;
  padding: 9px;
  border-bottom: 1px solid var(--line-soft);
}
tbody tr:nth-child(even) {
  background: var(--table-row-even);
}
tbody tr:hover {
  background: var(--table-row-hover);
}
th {
  position: sticky;
  top: 0;
  background: var(--table-head-bg);
  z-index: 1;
}
.w-90 {
  width: 84px;
}
.scroll {
  flex: 1;
  min-height: 0;
  overflow: auto;
  border: 1px solid var(--scroll-border);
  border-radius: 12px;
  scrollbar-width: thin;
  scrollbar-color: var(--json-scroll-thumb) var(--json-scroll-track);
}
.scroll::-webkit-scrollbar {
  width: 11px;
  height: 11px;
}
.scroll::-webkit-scrollbar-track {
  background: var(--json-scroll-track);
}
.scroll::-webkit-scrollbar-thumb {
  background: var(--json-scroll-thumb);
  border: 2px solid var(--json-scroll-track);
  border-radius: 999px;
}
.scroll::-webkit-scrollbar-thumb:hover {
  background: var(--json-scroll-thumb-hover);
}
mark {
  background: var(--mark);
  border-radius: 4px;
  padding: 0 1px;
}
.error-popup {
  position: fixed;
  inset: 0;
  z-index: 120;
  display: grid;
  place-items: center;
  padding: 20px;
  background: var(--error-overlay);
}
.error-popup[hidden] {
  display: none;
}
.error-popup-card {
  width: min(650px, calc(100vw - 40px));
  border-radius: 14px;
  border: 1px solid var(--error-border);
  background: var(--error-bg);
  box-shadow: 0 18px 44px rgb(0 0 0 / 28%);
  padding: 12px;
}
.error-popup-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.error-popup-head strong {
  color: var(--error-text);
  font-size: 15px;
}
.error-popup-message {
  color: var(--error-text);
  font-size: 14px;
  line-height: 1.35;
  white-space: nowrap;
  overflow-x: auto;
  margin-top: 8px;
}
@media (max-width: 720px) {
  .error-popup-message {
    white-space: normal;
    overflow-x: visible;
    overflow-wrap: anywhere;
    word-break: break-word;
  }
}
.error-popup-close {
  border: 1px solid transparent;
  background: transparent;
  color: var(--error-close);
  font-size: 22px;
  line-height: 1;
  width: 30px;
  height: 30px;
  border-radius: 8px;
  padding: 0;
  margin: 0;
}
.error-popup-close:hover:not(:disabled) {
  background: var(--error-close-hover-bg);
  border-color: transparent;
  box-shadow: none;
}
code {
  background: var(--code-bg);
  padding: 1px 6px;
  border-radius: 6px;
}
.drop-json-preview .json-formatter-row,
.drop-json-preview .json-formatter-row a,
.drop-json-preview .json-formatter-row a:hover {
  font-family:
    "JetBrains Mono",
    "SFMono-Regular",
    Menlo,
    Consolas,
    monospace;
  font-size: 12px;
  line-height: 1.45;
  text-decoration: none;
}
.drop-json-preview .json-formatter-row > :first-child {
  display: inline-block;
  padding: 1px 4px;
  border-radius: 6px;
}
.drop-json-preview .json-formatter-row:hover > :first-child {
  background: var(--json-row-hover);
}
.drop-json-preview .json-formatter-row .json-formatter-row {
  margin-left: 0.85rem;
}
.drop-json-preview .json-formatter-row .json-formatter-children {

@media (max-width: 1200px) {
  .app-shell {
    --panel-left-min: 600px;
    --panel-right-min: 400px;
  }
  .row-no-wrap {
    flex-wrap: wrap;
  }
  .card-meta .row-no-wrap {
    flex-wrap: nowrap;
  }
  .row {
    gap: 8px;
  }
}
@media (max-width: 980px) {
  html,
  body {
    height: auto;
    min-height: 100%;
    overflow: auto;
  }
  .app-shell {
    height: auto;
    min-height: 100vh;
    padding: 10px;
    grid-template-columns: minmax(0, 1fr);
    gap: 10px;
  }
  .card {
    padding: 12px;
    border-radius: 12px;
  }
  .card-header {
    gap: 6px;
  }
  .card-header h1 {
    font-size: clamp(24px, 5.3vw, 32px);
  }
  .card-header p {
    font-size: 15px;
  }
  .card-meta .row {
    gap: 6px;
  }
  .badge {
    max-width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #fileBadge {
    max-width: min(70vw, 360px);
  }
  .panel-left,
  .panel-right {
    display: contents;
  }
  .card-meta .row-no-wrap {
    flex-wrap: wrap;
  }
  .panel-resizer {
    display: none;
  }
  .card-header {
    order: 1;
  }
  .card-meta {
    order: 2;
  }
  .card-drop {
    order: 3;
    flex: none;
  }
  .card-preview {
    order: 4;
    flex: none;
    min-height: 0;
  }
  .card-details {
    order: 5;
  }
  .mobile-accordion-toggle {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 44px;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    font-weight: 600;
    background: var(--btn-ghost-bg);
  }
  .mobile-accordion-content {
    overflow: hidden;
    transition:
      max-height 180ms ease,
      opacity 140ms ease,
      margin-top 140ms ease;
    margin-top: 6px;
  }
  .mobile-accordion-json > .mobile-accordion-content {
    max-height: min(50vh, 340px);
  }
  .mobile-accordion-json:not(.has-json-preview) > .mobile-accordion-toggle {
    display: none;
  }
  .mobile-accordion-json:not(.has-json-preview) > .mobile-accordion-content {
    max-height: none;
    margin-top: 0;
  }
  .mobile-accordion-preview > .mobile-accordion-content {
    max-height: min(68vh, 520px);
  }
  .mobile-accordion.is-collapsed > .mobile-accordion-content {
    max-height: 0;
    margin-top: 0;
    opacity: 0;
    pointer-events: none;
  }
  .card-drop .mobile-accordion-content > .row:first-child {
    flex: none;
    min-height: 170px;
  }
  .card-drop .drop {
    min-height: 170px;
    height: auto;
    padding: 12px;
  }
  .card-preview .row.mt-10 {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 8px;
    align-items: center;
  }
  .card-preview .row.mt-10 > * {
    min-width: 0;
  }
  .card-preview .row.mt-10 .search-grow {
    width: 100%;
    grid-column: 1 / -1;
  }
  .scroll {
    max-height: 42vh;
  }
}
@media (max-width: 640px) {
  .app-shell {
    padding: 8px;
    gap: 8px;
  }
  .card {
    padding: 10px;
  }
  .card-header .row-between {
    align-items: flex-start;
  }
  .card-preview .row.mt-10 {
    grid-template-columns: 1fr;
  }
  .card-preview .row.mt-10 .search-grow {
    grid-column: auto;
  }
  .card-preview .row.mt-10 label,
  .card-preview .row.mt-10 button,
  .card-preview .row.mt-10 .search-grow {
    width: 100%;
  }
  .card-preview .field-limit {
    justify-content: space-between;
  }
  .card-preview .field-limit input[type=number] {
    width: 100%;
    max-width: 120px;
  }
  .card-details .row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    align-items: stretch;
  }
  .card-details .row > * {
    width: 100%;
  }
  .card-details .row .download-format-field {
    width: 100%;
  }
  .card-details .row .download-field {
    justify-content: flex-start;
  }
  .card-details #btnDownload {
    height: auto;
  }
}

  </head>

  <body>
    <main class="app-shell">
      <section class="panel panel-left">
        <header class="card card-header">
          <div class="row row-between row-no-wrap">
            <h1>IcoMoon JSON -> CSV / XLSX</h1>
            <label class="theme-switch" for="themeToggleInput" title="Toggle theme">
              <input
                id="themeToggleInput"
                type="checkbox"
                role="switch"
                aria-label="Toggle light or dark theme"
                aria-checked="false"
              />
              <span class="theme-switch-ui" aria-hidden="true">
                <span class="theme-icon theme-icon-sun">☀</span>
                <span class="theme-icon theme-icon-moon">☾</span>
                <span class="theme-switch-thumb"></span>
              </span>
            </label>
          </div>
          <p class="muted">Supports IcoMoon <strong>V1</strong> and <strong>V2</strong>.</p>
        </header>

        <div class="card card-meta">
          <div class="row row-between row-no-wrap">
            <div class="row row-tight meta-badges">
              <span id="fileBadge" class="badge badge-soft">No file</span>
              <span id="formatBadge" class="badge" hidden></span>
              <span id="statsBadge" class="badge" hidden></span>
            </div>
            <button id="btnRemoveJson" type="button" class="btn-ghost btn-remove-json" hidden disabled>
              Remove JSON
            </button>
          </div>
        </div>

        <div class="card card-drop">
          <div id="jsonAccordion" class="mobile-accordion mobile-accordion-json">
            <button
              id="jsonAccordionToggle"
              type="button"
              class="mobile-accordion-toggle"
              aria-expanded="true"
              aria-controls="jsonAccordionContent"
            >
              <span>JSON Preview</span>
              <span class="mobile-accordion-chevron" aria-hidden="true">▾</span>
            </button>

            <div id="jsonAccordionContent" class="mobile-accordion-content">
              <div class="row">
                <div class="drop" id="dropZone" role="button" tabindex="0" aria-label="Drag or choose JSON file">
                  <div id="dropEmptyState">
                    <strong>Drag JSON here</strong> or click to choose
                    <div class="muted">e.g. <code>selection.json</code> (V1) / export (V2)</div>
                  </div>
                  <div id="dropJsonPreview" class="drop-json-preview" hidden></div>
                </div>
                <input id="fileInput" type="file" accept=".json,application/json" hidden />
              </div>
            </div>
          </div>
        </div>

      </section>

      <div
        id="panelResizeHandle"
        class="panel-resizer"
        role="separator"
        aria-orientation="vertical"
        aria-label="Resize left and right panels"
        tabindex="0"
      ></div>

      <section class="panel panel-right">
        <div class="card card-preview">
          <div id="previewAccordion" class="mobile-accordion mobile-accordion-preview">
            <button
              id="previewAccordionToggle"
              type="button"
              class="mobile-accordion-toggle"
              aria-expanded="true"
              aria-controls="previewAccordionContent"
            >
              <span>Preview</span>
              <span class="mobile-accordion-chevron" aria-hidden="true">▾</span>
            </button>

            <div id="previewAccordionContent" class="mobile-accordion-content">
              <div class="row row-between">
                <div class="row row-tight">
                  <strong>Preview</strong>
                  <span class="muted" id="previewMeta">-</span>
                </div>
              </div>

              <div class="row mt-10">
                <input id="searchInput" class="search-grow" type="text" placeholder="Search icon name..." />

                <label class="row row-tight field-limit">
                  <span class="muted">Preview limit</span>
                  <input id="limitInput" type="number" min="1" max="50000" value="500" />
                </label>

                <label class="row row-tight">
                  <input id="uniqueSort" type="checkbox" />
                  Unique + A->Z
                </label>

                <button id="btnResetFilters" type="button" class="btn-ghost">Reset filters</button>
                <button id="btnCopy" type="button" class="btn-ghost" disabled>Copy preview</button>
              </div>

              <div id="previewScroll" class="scroll mt-10">
                <table>
                  <thead>
                    <tr>
                      <th class="w-90">#</th>
                      <th>name</th>
                    </tr>
                  </thead>
                  <tbody id="previewBody">
                    <tr><td colspan="2" class="muted">No data yet.</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <div class="card card-details">
          <div class="row">
            <label class="download-field download-name-field">
              <span class="muted">File name</span>
              <input id="downloadFileName" type="text" value="icons_xlsx" placeholder="icons_xlsx" />
            </label>
            <label class="download-field download-format-field select-field">
              <span class="muted">Format</span>
              <select id="downloadFormat">
                <option value="xlsx" selected>XLSX</option>
                <option value="csv">CSV</option>
              </select>
            </label>
            <button id="btnDownload" type="button" class="btn-primary" disabled>Download</button>
          </div>
        </div>
      </section>
    </main>
    <div id="iconHoverPreview" class="icon-hover-preview" hidden>
      <div id="iconHoverSvg" class="icon-hover-svg"></div>
      <div id="iconHoverName" class="icon-hover-name"></div>
    </div>
    <div
      id="errorPopup"
      class="error-popup"
      role="alertdialog"
      aria-modal="true"
      aria-labelledby="errorPopupTitle"
      aria-describedby="errorPopupMessage"
      hidden
    >
      <div class="error-popup-card" role="document">
        <div class="error-popup-head">
          <strong id="errorPopupTitle">Error</strong>
          <button id="errorPopupClose" type="button" class="error-popup-close" aria-label="Close error popup">×</button>
        </div>
        <div id="errorPopupMessage" class="error-popup-message"></div>
      </div>
    </div>
