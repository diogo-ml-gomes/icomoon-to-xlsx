  <body>
    <main class="app-shell">
      <section class="panel panel-left">
        <header class="card card-header">
          <div class="row row-between row-no-wrap">
            <h1>IcoMoon JSON -> CSV / XLSX</h1>
            <button id="btnThemeToggle" type="button" class="btn-ghost btn-theme">Tema: Claro</button>
          </div>
          <p class="muted">Suporta IcoMoon <strong>V1</strong> e <strong>V2</strong>.</p>
        </header>

        <div class="card card-drop">
          <div class="row">
            <div class="drop" id="dropZone" role="button" tabindex="0" aria-label="Arrastar ou escolher ficheiro JSON">
              <div id="dropEmptyState">
                <strong>Arrasta o JSON aqui</strong> ou clica para escolher
                <div class="muted">Ex: <code>selection.json</code> (V1) / export (V2)</div>
              </div>
              <div id="dropJsonPreview" class="drop-json-preview" hidden></div>
            </div>
            <input id="fileInput" type="file" accept=".json,application/json" hidden />
          </div>
        </div>

        <div class="card card-details">
          <div class="row mt-12">
            <span id="fileBadge" class="badge badge-soft">Sem ficheiro</span>
            <span id="formatBadge" class="badge">-</span>
            <span id="statsBadge" class="badge">-</span>
          </div>

          <div class="row mt-12">
            <button id="btnRemoveJson" type="button" class="btn-ghost" disabled>Remover JSON</button>
            <label class="row row-tight">
              <span class="muted">Formato</span>
              <select id="downloadFormat">
                <option value="xlsx" selected>XLSX</option>
                <option value="csv">CSV</option>
              </select>
            </label>
            <button id="btnDownload" type="button" class="btn-primary" disabled>Download</button>
          </div>

          <div id="status" class="muted mt-10">A espera do ficheiro...</div>
          <div id="errors" class="error mt-8"></div>
        </div>
      </section>

      <section class="panel panel-right">
        <div class="card card-preview">
          <div class="row row-between">
            <div class="row row-tight">
              <strong>Preview</strong>
              <span class="muted" id="previewMeta">-</span>
            </div>
          </div>

          <div class="row mt-10">
            <input id="searchInput" class="search-grow" type="text" placeholder="Search icon name..." />

            <label class="row row-tight field-limit">
              <span class="muted">Preview limit</span>
              <input id="limitInput" type="number" min="1" max="50000" value="500" />
            </label>

            <label class="row row-tight">
              <input id="uniqueSort" type="checkbox" />
              Unique + A->Z
            </label>

            <button id="btnResetFilters" type="button" class="btn-ghost">Reset filtros</button>
            <button id="btnCopy" type="button" class="btn-ghost" disabled>Copiar preview</button>
          </div>

          <div class="scroll mt-10">
            <table>
              <thead>
                <tr>
                  <th class="w-90">#</th>
                  <th>name</th>
                </tr>
              </thead>
              <tbody id="previewBody">
                <tr><td colspan="2" class="muted">Sem dados ainda.</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
